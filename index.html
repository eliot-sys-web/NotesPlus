<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>NotesPlus</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NotesPlus">
<meta name="theme-color" content="#f2f2f7">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="Notes180.png">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    background: #000;
    font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    height: 100vh;
    overflow: hidden;
  }

  #notes-list-view {
    display: flex;
    flex-direction: column;
    height: 100vh;
    background: #000;
  }

  .list-header {
    padding: 60px 16px 8px;
    background: #000;
  }

  .list-header h1 {
    font-size: 34px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.3px;
  }

  .list-header p {
    font-size: 13px;
    color: #8e8e93;
    margin-top: 2px;
  }

  .notes-container {
    flex: 1;
    overflow-y: auto;
    padding: 0 16px;
    background: #000;
  }

  .note-item {
    background: #1c1c1e;
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .note-item:active {
    opacity: 0.6;
  }

  .note-item .note-title {
    font-size: 17px;
    font-weight: 600;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .note-item .note-preview {
    font-size: 14px;
    color: #8e8e93;
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .bottom-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 24px 34px;
    background: #000;
    border-top: 0.5px solid #38383a;
  }

  .bottom-bar span {
    font-size: 13px;
    color: #8e8e93;
  }

  .new-note-btn {
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .new-note-btn svg {
    width: 28px;
    height: 28px;
    fill: #ffcc00;
  }

  #note-editor-view {
    display: none;
    flex-direction: column;
    height: 100vh;
    background: #000;
  }

  .editor-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 56px 16px 8px;
    border-bottom: 0.5px solid #38383a;
    background: #000;
  }

  .back-btn {
    display: flex;
    align-items: center;
    gap: 4px;
    color: #ffcc00;
    font-size: 17px;
    cursor: pointer;
    padding: 4px 0;
  }

  .back-btn svg {
    width: 11px;
    height: 18px;
    fill: none;
    stroke: #ffcc00;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .editor-actions {
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .editor-actions svg {
    width: 22px;
    height: 22px;
    fill: none;
    stroke: #ffcc00;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    cursor: pointer;
  }

  .ok-btn {
    color: #ffcc00;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
  }

  .editor-date {
    text-align: center;
    font-size: 12px;
    color: #8e8e93;
    padding: 6px 0 4px;
    background: #000;
  }

  .editor-body {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px 40px;
    position: relative;
    background: #000;
  }

  #display-area {
    font-size: 17px;
    line-height: 1.6;
    color: #fff;
    min-height: 100%;
    white-space: pre-wrap;
    word-break: break-word;
    caret-color: transparent;
    outline: none;
  }

  #display-area .title-line {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.4;
    display: block;
  }

  #display-area .body-line {
    font-size: 17px;
    font-weight: 400;
    display: block;
    min-height: 1.6em;
  }

  .cursor {
    display: inline-block;
    width: 2px;
    height: 1.1em;
    background: #007aff;
    vertical-align: text-bottom;
    margin-left: 1px;
    animation: blink 1s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  #hidden-input {
    position: absolute;
    opacity: 0;
    width: 1px;
    height: 1px;
    top: 0;
    left: 0;
    pointer-events: none;
  }

  .editor-toolbar {
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 12px 0;
    padding-bottom: 28px;
    background: #1c1c1e;
    border-top: 1px solid #3a3a3c;
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    box-sizing: border-box;
    font-family: -apple-system, sans-serif;
  }

  .editor-toolbar svg {
    fill: none;
    stroke: #ffcc00;
    stroke-width: 2;
  }

  #wiki-indicator {
    display: none;
    position: fixed;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    background: #1c1c1e;
    color: #fff;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    z-index: 999;
  }
</style>
</head>
<body>

<script>
// ============================================================
// CONFIGURATION
// ============================================================
const COVER_TEXT = "Sa date de naissance";
const COVER_TRIGGER = "  ";
const BCGIS_TEXT = "BCGIS";

// Mapping signe astrologique : numéro → { nom, mois1, jourLimite, mois2 }
// Si jour <= jourLimite → mois1, sinon → mois2
// jourLimite = dernier jour du premier mois du signe
const SIGNES = {
  1:  { nom: 'Bélier',      mois1: 'mars',      limite: 31, mois2: 'avril'     }, // 21 mars – 19 avril
  2:  { nom: 'Taureau',     mois1: 'avril',     limite: 30, mois2: 'mai'       }, // 20 avril – 20 mai
  3:  { nom: 'Gémeaux',     mois1: 'mai',       limite: 31, mois2: 'juin'      }, // 21 mai – 20 juin
  4:  { nom: 'Cancer',      mois1: 'juin',      limite: 30, mois2: 'juillet'   }, // 21 juin – 22 juillet
  5:  { nom: 'Lion',        mois1: 'juillet',   limite: 31, mois2: 'août'      }, // 23 juillet – 22 août
  6:  { nom: 'Vierge',      mois1: 'août',      limite: 31, mois2: 'septembre' }, // 23 août – 22 sept
  7:  { nom: 'Scorpion',    mois1: 'octobre',   limite: 31, mois2: 'novembre'  }, // 23 oct – 21 nov
  8:  { nom: 'Sagittaire',  mois1: 'novembre',  limite: 30, mois2: 'décembre'  }, // 22 nov – 21 déc
  9:  { nom: 'Capricorne',  mois1: 'décembre',  limite: 31, mois2: 'janvier'   }, // 22 déc – 19 janv
  10: { nom: 'Verseau',     mois1: 'janvier',   limite: 31, mois2: 'février'   }, // 20 janv – 18 fév
  11: { nom: 'Poissons',    mois1: 'février',   limite: 29, mois2: 'mars'      }, // 19 fév – 20 mars
  12: { nom: 'Balance',     mois1: 'septembre', limite: 30, mois2: 'octobre'   }, // 23 sept – 22 oct
};

// Seuil : premier jour du deuxième mois du signe (si jour >= seuil → mois2)
const SEUILS = {
  1:  20, // Bélier : à partir du 20 avril → avril
  2:  21, // Taureau : à partir du 21 mai → mai
  3:  21, // Gémeaux : à partir du 21 juin → juin
  4:  23, // Cancer : à partir du 23 juillet → juillet
  5:  23, // Lion : à partir du 23 août → août
  6:  23, // Vierge : à partir du 23 sept → sept
  7:  23, // Scorpion : à partir du 23 oct → oct (déjà mois1)
  8:  22, // Sagittaire : à partir du 22 nov → nov (déjà mois1)
  9:  22, // Capricorne : à partir du 22 déc → déc (déjà mois1)
  10: 20, // Verseau : à partir du 20 janv → janv (déjà mois1)
  11: 19, // Poissons : à partir du 19 fév → fév (déjà mois1)
  12: 23, // Balance : à partir du 23 sept → sept (déjà mois1)
};

// Retourne le nom du mois à partir du numéro de signe et du jour
function getMoisFromSigne(numSigne, jour) {
  const s = SIGNES[numSigne];
  if (!s) return null;
  const seuil = SEUILS[numSigne];
  // Si jour >= seuil → on est encore dans mois1 (début du signe)
  // Si jour < seuil → on est dans mois2 (fin du signe)
  if (jour >= seuil) {
    return s.mois1;
  } else {
    return s.mois2;
  }
}

// ============================================================
// STATE
// ============================================================
let currentNoteMode = null; // 'wikipedia' | 'bcgis' | 'astro'

const state = {
  phase: 'title',
  realText: '',
  displayLines: [],
  currentLineIndex: 0,
  coverWordBuffer: '',
  coverDisplayIndex: 0,
  dateBuffer: '',
  dateDisplayIndex: 0,
  freeBuffer: '',
  spaceCount: 0,
  coverSpacePressed: false,
  dateWaiting: false,
  bcgisDone: false,
  bcgisDisplayIndex: 0,
  // Astro
  astroSigneBuffer: '',    // chiffres tapés pour le signe (ex: "7" ou "12")
  astroJourBuffer: '',     // chiffres tapés pour le jour
  astroSigneValidé: false, // true quand espace après signe reçu
  astroJourValidé: false,  // true quand espace après jour reçu
  astroMoisBuffer: '',     // nom du mois calculé, à typer lettre par lettre
  astroMoisIndex: 0,       // index d'affichage du mois
  astroMoisTyping: false,  // en train de taper le mois automatiquement
};

// ============================================================
// NAVIGATION
// ============================================================
function showListView() {
  document.getElementById('note-editor-view').style.display = 'none';
  document.getElementById('notes-list-view').style.display = 'flex';
}

function showEditorView(mode) {
  currentNoteMode = mode;
  document.getElementById('notes-list-view').style.display = 'none';
  document.getElementById('note-editor-view').style.display = 'flex';
  initEditor(mode);
  setTimeout(() => focusHiddenInput(), 100);
}

// ============================================================
// EDITEUR - INIT
// ============================================================
function initEditor(mode) {
  const now = new Date();
  document.getElementById('editor-date').textContent = formatDateFR(now);

  if (mode === 'wikipedia') {
    Object.assign(state, {
      phase: 'title',
      realText: '',
      displayLines: [''],
      currentLineIndex: 0,
      coverWordBuffer: '',
      coverDisplayIndex: 0,
      dateBuffer: '',
      dateDisplayIndex: 0,
      freeBuffer: '',
      spaceCount: 0,
      coverSpacePressed: false,
      dateWaiting: false,
      bcgisDone: false,
      bcgisDisplayIndex: 0,
    });
  } else if (mode === 'bcgis') {
    Object.assign(state, {
      phase: 'bcgis-cover',
      realText: '',
      displayLines: [''],
      currentLineIndex: 0,
      bcgisDone: false,
      bcgisDisplayIndex: 0,
    });
  } else if (mode === 'astro') {
    Object.assign(state, {
      phase: 'astro-line1',
      realText: '',
      displayLines: [''],
      currentLineIndex: 0,
      // Ligne 1
      astroSigneBuffer: '',
      astroJourBuffer: '',
      astroSigneValidé: false,
      astroJourValidé: false,
      astroMoisBuffer: '',
      astroMoisIndex: 0,
      astroMoisTyping: false,
      // Ligne 2
      astroAnnéeBuffer: '',
      astroAnnéeValidée: false,
      astroMois2Index: 0,
      astroMois2Typing: false,
    });
  }


  renderDisplay();
}

// ============================================================
// EDITEUR - RENDU
// ============================================================
function renderDisplay() {
  const area = document.getElementById('display-area');
  area.innerHTML = '';

  state.displayLines.forEach((line, i) => {
    const span = document.createElement('span');
    span.className = i === 0 ? 'title-line' : 'body-line';

    if (i === state.currentLineIndex) {
      span.textContent = line;
      const cursor = document.createElement('span');
      cursor.className = 'cursor';
      span.appendChild(cursor);
    } else {
      span.textContent = line;
    }

    area.appendChild(span);
  });
}

// ============================================================
// EDITEUR - INPUT
// ============================================================
function focusHiddenInput() {
  document.getElementById('hidden-input').focus();
}

document.getElementById('editor-body').addEventListener('click', focusHiddenInput);
document.getElementById('display-area').addEventListener('click', focusHiddenInput);
document.getElementById('hidden-input').addEventListener('keydown', handleKeyDown);

async function handleKeyDown(e) {
  e.preventDefault();
  const key = e.key;
  if (key === 'Backspace') { handleBackspace(); return; }
  if (key === 'Enter') { handleEnter(); return; }
  if (key.length > 1) return;
  handleChar(key);
}

// ============================================================
// GESTION DES CARACTÈRES
// ============================================================
async function handleChar(char) {

  // ===== MODE BCGIS =====
  if (currentNoteMode === 'bcgis') {
    if (state.phase === 'bcgis-cover') {
      if (state.bcgisDisplayIndex < BCGIS_TEXT.length) {
        state.bcgisDisplayIndex++;
        state.displayLines[state.currentLineIndex] = BCGIS_TEXT.substring(0, state.bcgisDisplayIndex);
        renderDisplay();
        if (state.bcgisDisplayIndex >= BCGIS_TEXT.length) {
          state.phase = 'bcgis-free';
        }
      }
      return;
    }
    if (state.phase === 'bcgis-free') {
      state.displayLines[state.currentLineIndex] += char;
      renderDisplay();
      return;
    }
    return;
  }

  // ===== MODE ASTRO =====
  if (currentNoteMode === 'astro') {
    handleCharAstro(char);
    return;
  }

  // ===== MODE WIKIPEDIA =====
  if (state.phase === 'title') {
    state.displayLines[0] += char;
    renderDisplay();
    saveCurrentNote();
    return;
  }

  if (state.phase === 'cover-word') {
    if (char === ' ') {
      state.spaceCount = (state.spaceCount || 0) + 1;
      if (state.spaceCount >= 2 && !state.coverSpacePressed) {
        state.coverSpacePressed = true;
        state.spaceCount = 0;
        fetchBirthdate(state.coverWordBuffer.trim());
      }
    } else {
      state.spaceCount = 0;
    }
    if (!state.coverSpacePressed) {
      state.coverWordBuffer += char;
    }
    if (state.coverDisplayIndex < COVER_TEXT.length) {
      state.coverDisplayIndex++;
      state.displayLines[state.currentLineIndex] = COVER_TEXT.substring(0, state.coverDisplayIndex);
      renderDisplay();
      saveCurrentNote();
    }
    return;
  }

  if (state.phase === 'date-typing') {
    if (state.dateDisplayIndex < state.dateBuffer.length) {
      state.displayLines[state.currentLineIndex] = state.dateBuffer.substring(0, state.dateDisplayIndex + 1);
      state.dateDisplayIndex++;
    }
    renderDisplay();
    saveCurrentNote();
    return;
  }

  if (state.phase === 'free-multi') {
    state.displayLines[state.currentLineIndex] += char;
    renderDisplay();
    saveCurrentNote();
    return;
  }
}

// ============================================================
// MODE ASTRO - LOGIQUE PRINCIPALE
// ============================================================
function handleCharAstro(char) {

  // --- Phase astro-line1 : saisie du signe et du jour ---
  if (state.phase === 'astro-line1') {

    // Tant que le signe n'est pas validé
    if (!state.astroSigneValidé) {
      if (char === ' ') {
        // L'espace valide le signe, on affiche l'espace réellement
        if (state.astroSigneBuffer.length > 0) {
          state.astroSigneValidé = true;
          state.displayLines[state.currentLineIndex] += ' ';
          renderDisplay();
        }
      } else {
        // On accepte uniquement les chiffres (1 ou 2 chiffres max)
        if (/\d/.test(char) && state.astroSigneBuffer.length < 2) {
          state.astroSigneBuffer += char;
          state.displayLines[state.currentLineIndex] += char;
          renderDisplay();
        }
      }
      return;
    }

    // Signe validé, on saisit le jour
    if (!state.astroJourValidé) {
      if (char === ' ') {
        // L'espace valide le jour → on déclenche le cover typing du mois
        if (state.astroJourBuffer.length > 0) {
          state.astroJourValidé = true;
          const numSigne = parseInt(state.astroSigneBuffer);
          const jour = parseInt(state.astroJourBuffer);
          const mois = getMoisFromSigne(numSigne, jour);
          if (mois) {
            state.astroMoisBuffer = mois;
          } else {
            state.astroMoisBuffer = 'inconnu';
          }
          state.astroMoisIndex = 0;
          state.astroMoisTyping = true;
          // On démarre le typing automatique du mois
          autoTypeMois();
        }
      } else {
        // On accepte uniquement les chiffres (1 ou 2 chiffres max pour le jour)
        if (/\d/.test(char) && state.astroJourBuffer.length < 2) {
          state.astroJourBuffer += char;
          state.displayLines[state.currentLineIndex] += char;
          renderDisplay();
        }
      }
      return;
    }

    // Mois en cours de typing automatique → chaque touche = lettre suivante du mois
    if (state.astroMoisTyping) {
      if (state.astroMoisIndex < state.astroMoisBuffer.length) {
        const baseText = state.astroSigneBuffer + ' ' + state.astroJourBuffer + ' ';
        state.astroMoisIndex++;
        state.displayLines[state.currentLineIndex] = baseText + state.astroMoisBuffer.substring(0, state.astroMoisIndex);
        renderDisplay();
        if (state.astroMoisIndex >= state.astroMoisBuffer.length) {
          state.astroMoisTyping = false;
          // Passe en astro-free pour la suite de la ligne
          state.phase = 'astro-free-line1';
        }
      }
      return;
    }

    return;
  }

  // --- Phase astro-free-line1 : suite libre sur la ligne 1 ---
  if (state.phase === 'astro-free-line1') {
    state.displayLines[state.currentLineIndex] += char;
    renderDisplay();
    return;
  }

  // --- Phase astro-line2 : saisie de l'année + cover typing du mois ---
  if (state.phase === 'astro-line2') {
    handleCharAstroLine2(char);
    return;
  }

  // --- Phase astro-free : saisie libre après ligne 2 ---
  if (state.phase === 'astro-free') {
    state.displayLines[state.currentLineIndex] += char;
    renderDisplay();
    return;
  }
}

// ============================================================
// GESTION ENTRÉE
// ============================================================
async function handleEnter() {

  // ===== MODE BCGIS =====
  if (currentNoteMode === 'bcgis') {
    if (state.phase === 'bcgis-free' || state.phase === 'bcgis-cover') {
      state.currentLineIndex++;
      state.displayLines.push('');
      state.phase = 'bcgis-free';
      renderDisplay();
    }
    return;
  }

  // ===== MODE ASTRO =====
  if (currentNoteMode === 'astro') {
    handleEnterAstro();
    return;
  }

  // ===== MODE WIKIPEDIA =====
  if (state.currentLineIndex === 0 && state.phase === 'title') {
    state.currentLineIndex = 1;
    if (!state.displayLines[1]) state.displayLines.push('');
    state.phase = 'cover-word';
    state.coverDisplayIndex = 0;
    state.coverWordBuffer = '';
    state.coverSpacePressed = false;
    renderDisplay();
    return;
  }

  if (state.phase === 'cover-word') {
    if (state.coverDisplayIndex < COVER_TEXT.length) return;
    state.currentLineIndex++;
    state.displayLines.push('');
    state.phase = 'date-typing';
    state.dateDisplayIndex = 0;
    if (!state.dateBuffer) { state.dateWaiting = true; }
    renderDisplay();
    return;
  }

  if (state.phase === 'date-typing') {
    state.currentLineIndex++;
    state.displayLines.push('');
    state.phase = 'free-multi';
    renderDisplay();
    return;
  }

  if (state.phase === 'free-multi') {
    state.currentLineIndex++;
    state.displayLines.push('');
    renderDisplay();
    return;
  }
}

// ============================================================
// MODE ASTRO - GESTION ENTRÉE
// ============================================================
function handleEnterAstro() {

  // Entrée sur la ligne 1 → passe à la ligne 2
  if (state.phase === 'astro-line1' || state.phase === 'astro-free-line1') {
    state.currentLineIndex++;
    state.displayLines.push('');
    // Réinitialise les variables de ligne 2
    state.astroAnnéeBuffer = '';
    state.astroAnnéeValidée = false;
    state.astroMois2Index = 0;
    state.astroMois2Typing = false;
    state.phase = 'astro-line2';
    renderDisplay();
    return;
  }

  // Entrée sur la ligne 2 ou en mode libre → nouvelle ligne libre
  if (state.phase === 'astro-line2' || state.phase === 'astro-free') {
    state.currentLineIndex++;
    state.displayLines.push('');
    state.phase = 'astro-free';
    renderDisplay();
    return;
  }
}

// ============================================================
// GESTION BACKSPACE
// ============================================================
function handleBackspace() {
  const line = state.displayLines[state.currentLineIndex];

  if (line.length > 0) {
    state.displayLines[state.currentLineIndex] = line.slice(0, -1);

    if (state.phase === 'cover-word' && state.coverDisplayIndex > 0) {
      state.coverDisplayIndex--;
      if (state.coverWordBuffer.length > 0) {
        state.coverWordBuffer = state.coverWordBuffer.slice(0, -1);
      }
    }
    if (state.phase === 'date-typing' && state.dateDisplayIndex > 0) {
      state.dateDisplayIndex--;
    }
    if (state.phase === 'bcgis-cover' && state.bcgisDisplayIndex > 0) {
      state.bcgisDisplayIndex--;
      if (state.bcgisDisplayIndex < BCGIS_TEXT.length) {
        state.phase = 'bcgis-cover';
      }
    }
  } else if (state.currentLineIndex > 0) {
    state.displayLines.splice(state.currentLineIndex, 1);
    state.currentLineIndex--;
    if (state.currentLineIndex === 0) state.phase = 'title';
  }

  renderDisplay();
  if (currentNoteMode === 'wikipedia') saveCurrentNote();
}

// ============================================================
// WIKIPEDIA
// ============================================================
async function fetchBirthdate(name) {
  const indicator = document.getElementById('wiki-indicator');
  indicator.style.display = 'none';

  try {
    const searchUrl = `https://fr.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(name)}&format=json&origin=*&srlimit=1`;
    const searchRes = await fetch(searchUrl);
    const searchData = await searchRes.json();

    if (!searchData.query.search.length) {
      state.dateBuffer = 'Date inconnue';
      indicator.style.display = 'none';
      if (state.dateWaiting) { state.dateWaiting = false; autoTypeDate(); }
      return;
    }

    const pageTitle = searchData.query.search[0].title;
    const wikidataUrl = `https://fr.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(pageTitle)}&prop=pageprops&format=json&origin=*`;
    const wikiRes = await fetch(wikidataUrl);
    const wikiData = await wikiRes.json();
    const pages = wikiData.query.pages;
    const page = Object.values(pages)[0];
    const wikidataId = page?.pageprops?.wikibase_item;

    if (!wikidataId) {
      state.dateBuffer = 'Date inconnue';
      indicator.style.display = 'none';
      if (state.dateWaiting) { state.dateWaiting = false; autoTypeDate(); }
      return;
    }

    const wdUrl = `https://www.wikidata.org/w/api.php?action=wbgetentities&ids=${wikidataId}&props=claims&format=json&origin=*`;
    const wdRes = await fetch(wdUrl);
    const wdData = await wdRes.json();
    const claims = wdData.entities[wikidataId]?.claims;
    const birthClaim = claims?.P569?.[0]?.mainsnak?.datavalue?.value?.time;

    if (birthClaim) {
      const match = birthClaim.match(/\+(\d{4})-(\d{2})-(\d{2})/);
      if (match) {
        state.dateBuffer = formatBirthdate(parseInt(match[3]), parseInt(match[2]), match[1]);
      } else {
        state.dateBuffer = 'Date inconnue';
      }
    } else {
      state.dateBuffer = 'Date inconnue';
    }

  } catch (err) {
    state.dateBuffer = 'Date inconnue';
  }

  indicator.style.display = 'none';
  if (state.dateWaiting) { state.dateWaiting = false; autoTypeDate(); }
}

function autoTypeDate() {
  if (state.phase !== 'date-typing') return;
  if (state.dateDisplayIndex >= state.dateBuffer.length) return;
  state.displayLines[state.currentLineIndex] = state.dateBuffer.substring(0, state.dateDisplayIndex + 1);
  state.dateDisplayIndex++;
  renderDisplay();
  saveCurrentNote();
  setTimeout(autoTypeDate, 80);
}

// ============================================================
const MOIS = ['janvier','février','mars','avril','mai','juin',
               'juillet','août','septembre','octobre','novembre','décembre'];

function formatBirthdate(day, month, year) {
  const d = String(day).padStart(2, '0');
  return `${d} ${MOIS[month - 1]} ${year}`;
}

function formatDateFR(date) {
  const jours = ['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
  const j = jours[date.getDay()];
  const d = date.getDate();
  const m = MOIS[date.getMonth()];
  const y = date.getFullYear();
  const h = String(date.getHours()).padStart(2, '0');
  const min = String(date.getMinutes()).padStart(2, '0');
  return `${j} ${d} ${m} ${y} à ${h}:${min}`;
}
